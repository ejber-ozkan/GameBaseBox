name: Quality Gates

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libwebkit2gtk-4.1-dev
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Frontend tests
        run: npm run test:frontend
      - name: Backend tests
        run: npm run test:backend
      - name: Dependency audit
        run: npm audit --omit=dev
      - name: Production build smoke test
        run: npm run build
      - name: Browser smoke tests
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e
