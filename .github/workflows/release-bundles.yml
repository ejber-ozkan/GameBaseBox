name: Release Bundles

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build Windows bundles
        required: false
        type: boolean
        default: false
      build_linux:
        description: Build Linux bundles
        required: false
        type: boolean
        default: true
      build_macos:
        description: Build macOS bundles
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

concurrency:
  group: release-bundles-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libwebkit2gtk-4.1-dev
      - name: Install dependencies
        run: npm ci
      - name: Run required quality gates
        run: |
          npm run lint
          npm run test:frontend
          npm run test:backend
          npm audit --omit=dev
          npm run build
          npx playwright install --with-deps chromium webkit
          npm run test:e2e

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          notes="RELEASE_NOTES_${version}.md"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --title "GBBox ${version}" --notes-file "$notes"
          else
            gh release create "${{ github.ref_name }}" --verify-tag --title "GBBox ${version}" --notes-file "$notes"
          fi

  build-windows:
    needs: quality
    if: github.event_name == 'push' || github.event.inputs.build_windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag matches VERSION
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match VERSION $version"
          }

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npx tauri build

      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          Copy-Item $installer.FullName "release-assets/GBBox-Windows-x64-Setup.exe"
          $version = (Get-Content VERSION -Raw).Trim()
          $notes = "RELEASE_NOTES_$version.md"
          if (Test-Path $notes) {
            Copy-Item $notes "release-assets/RELEASE_NOTES.md"
          } else {
            "GBBox $version release." | Set-Content "release-assets/RELEASE_NOTES.md"
          }

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v7
        with:
          name: gbbox-windows-bundles
          path: release-assets/**
          if-no-files-found: error

      - name: Attach Windows bundles to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "release-assets/GBBox-Windows-x64-Setup.exe" --clobber

  build-linux:
    needs: quality
    if: github.event_name == 'push' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag matches VERSION
        if: github.event_name == 'push'
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [ "v$version" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match VERSION $version" >&2
            exit 1
          fi

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npx tauri build

      - name: Prepare Linux release asset
        run: |
          mkdir -p release-assets
          installer="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -n 1)"
          if [ -z "$installer" ]; then
            echo "Linux AppImage not found" >&2
            exit 1
          fi
          cp "$installer" release-assets/GBBox-Linux.AppImage
          version="$(tr -d '\r\n' < VERSION)"
          notes="RELEASE_NOTES_${version}.md"
          if [ -f "$notes" ]; then
            cp "$notes" release-assets/RELEASE_NOTES.md
          else
            printf 'GBBox %s release.\n' "$version" > release-assets/RELEASE_NOTES.md
          fi

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v7
        with:
          name: gbbox-linux-bundles
          path: release-assets/**
          if-no-files-found: warn

      - name: Attach Linux bundles to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "release-assets/GBBox-Linux.AppImage" --clobber

  build-macos:
    needs: quality
    if: github.event_name == 'push' || github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag matches VERSION
        if: github.event_name == 'push'
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [ "v$version" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match VERSION $version" >&2
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npx tauri build

      - name: Prepare macOS release asset
        run: |
          mkdir -p release-assets
          installer="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | head -n 1)"
          if [ -z "$installer" ]; then
            echo "macOS DMG not found" >&2
            exit 1
          fi
          cp "$installer" release-assets/GBBox-macOS.dmg
          version="$(tr -d '\r\n' < VERSION)"
          notes="RELEASE_NOTES_${version}.md"
          if [ -f "$notes" ]; then
            cp "$notes" release-assets/RELEASE_NOTES.md
          else
            printf 'GBBox %s release.\n' "$version" > release-assets/RELEASE_NOTES.md
          fi

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v7
        with:
          name: gbbox-macos-bundles
          path: release-assets/**
          if-no-files-found: error

      - name: Attach macOS bundles to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "release-assets/GBBox-macOS.dmg" --clobber
